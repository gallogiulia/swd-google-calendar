<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tournament Results | Southwest Lawn Bowls</title>
  <meta
    name="description"
    content="Tournament results, champions, and photos for Southwest Lawn Bowls events."
  />

  <style>
    :root {
      --bg: #f5f5f3;
      --card: #f8f8f7;
      --white: #ffffff;
      --text: #222222;
      --muted: #666666;
      --line: #dddddd;
      --green: #1f6b4f;
      --green-dark: #16503b;
      --green-soft: #eef4f0;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.05);
      --radius-xl: 22px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --max: 1280px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
    }

    .results-page {
      max-width: var(--max);
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .results-header {
      margin-bottom: 28px;
    }

    .results-title {
      margin: 0;
      font-size: clamp(38px, 5vw, 68px);
      line-height: 1.05;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #222;
    }

    .results-title-year {
      color: var(--green);
      border-bottom: 4px solid var(--green);
      padding-bottom: 4px;
      margin-right: 12px;
      display: inline-block;
    }

    .results-subtitle {
      margin: 14px 0 0;
      max-width: 820px;
      font-size: 18px;
      color: var(--muted);
    }

    .results-toolbar {
      margin: 28px 0 34px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .year-filter {
      appearance: none;
      border: 1px solid #cfcfcf;
      background: var(--white);
      color: #222;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 16px;
      min-width: 160px;
      cursor: pointer;
    }

    .results-grid {
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .result-card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 28px;
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 30px;
      align-items: center;
    }

    .result-card.latest {
      outline: 1px solid rgba(31, 107, 79, 0.12);
    }

    .result-media {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-main {
      overflow: hidden;
      border-radius: var(--radius-lg);
      background: #e9e9e9;
    }

    .result-main img {
      aspect-ratio: 3 / 2;
      object-fit: cover;
    }

    .result-thumbs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .result-thumb {
      overflow: hidden;
      border-radius: var(--radius-md);
      background: #e9e9e9;
    }

    .result-thumb img {
      aspect-ratio: 3 / 2;
      object-fit: cover;
    }

    .result-content {
      min-width: 0;
    }

    .result-topline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .result-label {
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin: 0;
    }

    .latest-badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #eaf5ef;
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 7px 11px;
    }

    .result-name {
      margin: 0 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(34px, 4vw, 56px);
      line-height: 1.05;
      font-weight: 600;
      color: var(--green);
    }

    .result-meta {
      margin: 0 0 22px;
      font-size: clamp(20px, 2vw, 26px);
      color: #444;
    }

    .result-meta .dot {
      color: #999;
      padding: 0 10px;
    }

    .champions-box {
      overflow: hidden;
      border-radius: 0;
      border: 1px solid var(--line);
      background: var(--white);
      margin-bottom: 22px;
    }

    .champions-header {
      background: var(--green-soft);
      border-left: 8px solid var(--green);
      padding: 14px 18px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--green);
    }

    .champions-names {
      padding: 18px 20px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(22px, 2.5vw, 38px);
      line-height: 1.2;
      color: #222;
    }

    .result-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      padding: 15px 28px;
      font-size: 18px;
      font-weight: 700;
      transition: 0.2s ease;
      border: 1px solid transparent;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--green);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--green-dark);
    }

    .btn-secondary {
      background: #fff;
      color: #333;
      border-color: #cfcfcf;
    }

    .btn-secondary:hover {
      background: #f3f3f3;
    }

    .empty-state {
      padding: 40px 24px;
      border-radius: var(--radius-xl);
      background: #fff;
      box-shadow: var(--shadow);
      color: var(--muted);
      font-size: 18px;
    }

    @media (max-width: 980px) {
      .result-card {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .results-page {
        padding: 28px 14px 60px;
      }

      .result-card {
        padding: 18px;
        gap: 18px;
      }

      .result-meta {
        font-size: 18px;
      }

      .result-meta .dot {
        padding: 0 6px;
      }

      .btn {
        width: 100%;
        padding: 14px 18px;
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <main class="results-page">
    <header class="results-header">
      <h1 class="results-title">
        <span id="pageYear" class="results-title-year">2026</span>Tournament Results
      </h1>
      <p class="results-subtitle">
        Explore champions, winner photos, and full tournament results from the Southwest Division season.
      </p>
    </header>

    <div class="results-toolbar">
      <select id="yearFilter" class="year-filter" aria-label="Filter tournament results by year"></select>
    </div>

    <section id="resultsGrid" class="results-grid"></section>
  </main>

  <script src="./results-data.js"></script>
  <script>
    (function () {
      const allResults = Array.isArray(window.SWD_RESULTS) ? window.SWD_RESULTS.slice() : [];
      const yearFilter = document.getElementById("yearFilter");
      const resultsGrid = document.getElementById("resultsGrid");
      const pageYear = document.getElementById("pageYear");

      if (!allResults.length) {
        resultsGrid.innerHTML = '<div class="empty-state">No tournament results found.</div>';
        return;
      }

      const years = [...new Set(allResults.map(item => item.year))].sort((a, b) => b - a);
      const defaultYear = years[0];

      function buildYearFilter() {
        yearFilter.innerHTML = years
          .map(year => `<option value="${year}">${year} Results</option>`)
          .join("");
        yearFilter.value = String(defaultYear);
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function sortResults(items) {
        return items.slice().sort((a, b) => {
          if (a.order !== b.order) return b.order - a.order;
          return 0;
        });
      }

      function render(year) {
        const filtered = sortResults(allResults.filter(item => String(item.year) === String(year)));
        pageYear.textContent = year;

        if (!filtered.length) {
          resultsGrid.innerHTML = '<div class="empty-state">No results available for this year yet.</div>';
          return;
        }

        resultsGrid.innerHTML = filtered.map((item, index) => {
          const latestBadge = index === 0 ? '<span class="latest-badge">Latest Result</span>' : '';
          const galleryButton = item.galleryUrl
            ? `<a class="btn btn-secondary" href="${escapeHtml(item.galleryUrl)}" target="_blank" rel="noopener">See Photo Gallery</a>`
            : '';

          return `
            <article class="result-card ${index === 0 ? "latest" : ""}">
              <div class="result-media">
                <div class="result-main">
                  <img src="${escapeHtml(item.images.main)}" alt="${escapeHtml(item.title)} winners">
                </div>
                <div class="result-thumbs">
                  <div class="result-thumb">
                    <img src="${escapeHtml(item.images.thumb1)}" alt="${escapeHtml(item.title)} supporting photo 1">
                  </div>
                  <div class="result-thumb">
                    <img src="${escapeHtml(item.images.thumb2)}" alt="${escapeHtml(item.title)} supporting photo 2">
                  </div>
                </div>
              </div>

              <div class="result-content">
                <div class="result-topline">
                  <p class="result-label">${escapeHtml(item.label)}</p>
                  ${latestBadge}
                </div>

                <h2 class="result-name">${escapeHtml(item.title)}</h2>

                <p class="result-meta">
                  ${escapeHtml(item.dateText)}
                  <span class="dot">•</span>
                  ${escapeHtml(item.club)}
                </p>

                <div class="champions-box">
                  <div class="champions-header">Champions</div>
                  <div class="champions-names">${escapeHtml(item.champions)}</div>
                </div>

                <div class="result-actions">
                  <a class="btn btn-primary" href="${escapeHtml(item.resultsUrl)}" target="_blank" rel="noopener">View Full Results</a>
                  ${galleryButton}
                </div>
              </div>
            </article>
          `;
        }).join("");
      }

      buildYearFilter();
      render(defaultYear);

      yearFilter.addEventListener("change", function () {
        render(this.value);
      });
    })();
  </script>
</body>
</html>
