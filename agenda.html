<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SWD Events – Agenda</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #fafafa; margin: 0; padding: 16px; }
    .container { max-width: 900px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .fc-header-toolbar { display: none !important; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; margin-bottom: 8px; padding: 12px; border: 1px solid #e5e7eb; border-radius: 12px 12px 0 0; background: #fafafa; font-size: 0.9rem; }
    .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .fc-list-day-cushion { background: #f8fafc !important; border-bottom: 1px solid #e2e8f0; padding: 12px 16px !important; }
    .fc-list-event-title { padding: 16px !important; }
    .event-card { border: 1px solid #e2e8f0; border-radius: 12px; padding: 0; overflow: hidden; margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="container">
  <div class="legend">
    <span style="font-weight:700; color:#64748b; margin-right:4px;">KEY:</span>
    <div style="display:flex; align-items:center; gap:6px;"><span class="swatch" style="background:#059669"></span>Women’s</div>
    <div style="display:flex; align-items:center; gap:6px;"><span class="swatch" style="background:#dc2626"></span>Men’s</div>
    <div style="display:flex; align-items:center; gap:6px;"><span class="swatch" style="background:#2563eb"></span>Club</div>
    <div style="display:flex; align-items:center; gap:6px;"><span class="swatch" style="background:#7c3aed"></span>Other</div>
    <div style="display:flex; align-items:center; gap:6px;"><span class="swatch" style="background:#f59e0b"></span>PBA</div>
  </div>
  <div id="calendar"></div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', async function() {
    const calEl = document.getElementById('calendar');

    let capacities = [];
    try {
      // Force Absolute URL for Capacity Data
      const res = await fetch('https://hub.swlawnbowls.org/api/check-capacity');
      const json = await res.json();
      capacities = json.data || (Array.isArray(json) ? json : []);
    } catch (e) { 
      console.error("Capacity fetch failed", e); 
    }

    const calendar = new FullCalendar.Calendar(calEl, {
      initialView: 'listYear',
      headerToolbar: false,
      // FORCE ABSOLUTE URL FOR EVENTS TO FIX "NO EVENTS" ERROR
      events: 'https://hub.swlawnbowls.org/api/events',
      eventClassNames: 'event-card',
      eventContent: function(arg) {
        const title = arg.event.title.trim();
        const color = arg.event.backgroundColor || '#2563eb';
        const eventUrl = arg.event.extendedProps.eventUrl;
        
        // Exact match check for tournament name
        const cap = capacities.find(c => c.name.trim().toLowerCase() === title.toLowerCase());
        
        let capHtml = '';
        if (cap) {
          const status = (cap.status || "").trim().toUpperCase();
          const isOpen = (status === 'OPEN');
          const isFull = (status === 'FULL') || (Number(cap.leftA) + Number(cap.leftB) <= 0);
          const releaseDate = cap.releaseDate;
          
          let buttonHtml = '';
          if (isFull) {
            buttonHtml = `<div style="background:#64748b; color:white; padding:8px 16px; border-radius:8px; font-weight:700;">FULL</div>`;
          } else if (isOpen && eventUrl) {
            buttonHtml = `<a href="${eventUrl}" target="_blank" style="background:${color}; color:white; padding:8px 16px; border-radius:8px; font-weight:700; text-decoration:none;">ENTRY OPEN</a>`;
          } else {
            // FIX: Prioritize Release Date from Column H over generic "COMING SOON"
            const dateText = releaseDate ? `OPENS ${releaseDate}` : "COMING SOON";
            buttonHtml = `<div style="color:#d97706; font-size:0.8rem; font-weight:700; background:#fff7ed; padding:6px 12px; border-radius:6px; border:1px solid #fed7aa; white-space:nowrap;">📅 ${dateText}</div>`;
          }

          capHtml = `
            <div style="margin-top:12px; background:#f8fafc; border-left:6px solid ${color}; padding:12px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
              <div style="font-size:0.9rem; color:#475569;">
                ${isOpen ? `
                  ${cap.leftA > 0 ? `Green A: <b>${cap.leftA}</b> left<br>` : ''}
                  ${cap.leftB > 0 ? `Green B: <b>${cap.leftB}</b> left` : ''}
                ` : `<span style="font-style:italic;">Registration details coming soon</span>`}
              </div>
              ${buttonHtml}
            </div>`;
        } else {
          capHtml = `<div style="margin-top:10px; color:#94a3b8; font-size:0.8rem; font-style:italic;">Schedule details pending...</div>`;
        }

        return {
          html: `
            <div style="padding:4px 0;">
              <div style="font-size:1.1rem; font-weight:700; color:#1e293b;">${title}</div>
              <div style="font-size:0.85rem; color:#64748b;">📍 ${arg.event.extendedProps.location || ''}</div>
              ${capHtml}
            </div>`
        };
      }
    });

    calendar.render();
  });
</script>
</body>
</html>
