<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SWD Events – Agenda</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #fafafa; margin: 0; padding: 16px; }
    .container { max-width: 900px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .fc-header-toolbar { display: none !important; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; margin-bottom: 8px; padding: 12px; border: 1px solid #e5e7eb; border-radius: 12px 12px 0 0; background: #fafafa; font-size: 0.9rem; }
    .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .fc-list-day-cushion { background: #f8fafc !important; border-bottom: 1px solid #e2e8f0; padding: 12px 16px !important; }
    .fc-list-event:hover td { background: transparent !important; }
    .fc-list-event-title { padding: 16px !important; }
    .event-card { border: 1px solid #e2e8f0; border-radius: 12px; padding: 0; overflow: hidden; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="container">
  <div class="legend">
    <span style="font-weight:700; color:#64748b; margin-right:4px;">KEY:</span>
    <div style="display:flex; align-items:center; gap:6px;"><span class="swatch" style="background:#059669"></span>Women’s</div>
    <div style="display:flex; align-items:center; gap:6px;"><span class="swatch" style="background:#dc2626"></span>Men’s</div>
    <div style="display:flex; align-items:center; gap:6px;"><span class="swatch" style="background:#2563eb"></span>Club</div>
    <div style="display:flex; align-items:center; gap:6px;"><span class="swatch" style="background:#7c3aed"></span>Other</div>
    <div style="display:flex; align-items:center; gap:6px;"><span class="swatch" style="background:#f59e0b"></span>PBA</div>
  </div>
  <div id="calendar"></div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', async function() {
    const calEl = document.getElementById('calendar');

    // 1. Fetch Capacity and Status data from Vercel
    let capacities = [];
    try {
      const res = await fetch('/api/check-capacity');
      const json = await res.json();
      // Handle both [data] and {data: []} formats
      capacities = Array.isArray(json) ? json : (json.data || []);
    } catch (e) { 
      console.error("Capacity fetch failed", e); 
    }

    const calendar = new FullCalendar.Calendar(calEl, {
      initialView: 'listYear',
      headerToolbar: false,
      events: '/api/events',
      eventClassNames: 'event-card',
      eventContent: function(arg) {
        const title = arg.event.title.trim();
        const color = arg.event.backgroundColor || '#2563eb';
        const eventUrl = arg.event.extendedProps.eventUrl;
        
        // Find matching data (case-insensitive and trimmed)
        const cap = capacities.find(c => c.name.trim().toLowerCase() === title.toLowerCase());
        
        let capHtml = '';
        if (cap) {
          const isFull = (Number(cap.leftA) <= 0 && Number(cap.leftB) <= 0);
          const isOpen = (cap.status === 'OPEN');
          const relDate = cap.releaseDate; 
          
          let buttonHtml = '';
          if (isFull) {
            buttonHtml = `<div style="background:#64748b; color:white; padding:8px 16px; border-radius:8px; font-weight:700;">FULL</div>`;
          } else if (isOpen && eventUrl) {
            buttonHtml = `<a href="${eventUrl}" target="_blank" style="background:${color}; color:white; padding:8px 16px; border-radius:8px; font-weight:700; text-decoration:none; display:inline-block; transition: 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">ENTRY OPEN</a>`;
          } else {
            // Show the Release Date if NOT OPEN
            const dateText = relDate ? `OPENS ${relDate}` : "COMING SOON";
            buttonHtml = `<div style="color:#d97706; font-size:0.85rem; font-weight:700; background:#fff7ed; padding:6px 10px; border-radius:6px; border:1px solid #fed7aa;">📅 ${dateText}</div>`;
          }

          capHtml = `
            <div style="margin-top:12px; background:#f8fafc; border-left:6px solid ${color}; padding:12px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
              <div style="font-size:0.9rem; color:#475569; line-height:1.4;">
                ${cap.leftA > 0 ? `Green A: <b>${cap.leftA}</b> left<br>` : ''}
                ${cap.leftB > 0 ? `Green B: <b>${cap.leftB}</b> left` : ''}
                ${(Number(cap.leftA) <= 0 && Number(cap.leftB) <= 0) ? '<b>Registration Closed</b>' : ''}
              </div>
              ${buttonHtml}
            </div>`;
        } else {
          // Fallback if tournament is in calendar but not yet in the spreadsheet
          capHtml = `
            <div style="margin-top:12px; background:#f4f4f5; border-left:6px solid #d4d4d8; padding:12px; border-radius:8px;">
              <div style="color:#71717a; font-size:0.85rem; font-weight:600;">REGISTRATION DETAILS PENDING</div>
            </div>`;
        }

        return {
          html: `
            <div style="padding:4px 0;">
              <div style="font-size:1.15rem; font-weight:800; color:#1e293b; letter-spacing:-0.01em;">${title}</div>
              <div style="font-size:0.85rem; color:#64748b; margin-top:2px; font-weight:500;">📍 ${arg.event.extendedProps.location || 'Location TBD'}</div>
              ${capHtml}
            </div>`
        };
      }
    });

    calendar.render();
  });
</script>
</body>
</html>
