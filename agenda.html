<!doctype html>
<!--
SWD 2026 Agenda Calendar
---------------------------------------
• Loads events dynamically from hub API
• Displays tournaments in list view (year)
• Shows a "View" button ONLY if a Squarespace URL exists
• No capacity logic
• No placeholders ("Link Coming Soon" removed)
• Fully iframe-safe for Squarespace embedding
---------------------------------------
-->

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SWD Events – 2026 Agenda</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    body { font-family: system-ui, sans-serif; background: #fafafa; margin: 0; padding: 16px; }
    .container { max-width: 900px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .fc-header-toolbar { display: none !important; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; margin-bottom: 8px; padding: 12px; border: 1px solid #e5e7eb; border-radius: 12px 12px 0 0; background: #fafafa; font-size: 0.85rem; }
    .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .info-bar { margin-bottom: 20px; padding: 12px 16px; border: 1px solid #fde68a; border-top: none; border-radius: 0 0 12px 12px; background: #fffbeb; font-size: 0.85rem; color: #92400e; line-height: 1.4; }
    .refresh-btn { background: #2b6cb0; border: none; color: white; padding: 8px 16px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .fc-list-day-cushion { background: #f1f1f1 !important; padding: 12px !important; }
  </style>
</head>

<body>
  <div class="container">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h1 style="margin:0;">2026 Season Agenda</h1>
      <button class="refresh-btn" onclick="initPage()">↻ REFRESH</button>
    </div>
    
    <div class="legend">
      <span><span class="swatch" style="background:#059669"></span> Women’s</span>
      <span><span class="swatch" style="background:#dc2626"></span> Men’s</span>
      <span><span class="swatch" style="background:#2563eb"></span> Club Sponsored</span>
      <span><span class="swatch" style="background:#7c3aed"></span> Other Tournaments</span>
      <span><span class="swatch" style="background:#f59e0b"></span> PBA</span>
    </div>

    <div class="info-bar">
      <strong>Tournament Notice:</strong> Forms and details are typically posted <strong>5–6 weeks</strong> prior to the event.
      <br><em>Click "View" to open the official tournament page.</em>
    </div>

    <div id="agenda"></div>

  </div>

<script>
  function initPage() {
    fetch(`https://hub.swlawnbowls.org/api/events?year=2026`)
      .then(r => r.json())
      .then(eventData => renderCalendar(eventData.events || []))
      .catch(err => console.error("Load failed", err));
  }

  function renderCalendar(events) {
    const calendarEl = document.getElementById("agenda");
    calendarEl.innerHTML = '';

    const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: "listYear",
      initialDate: "2026-02-01",
      headerToolbar: false,
      events: events,

      eventContent: function(arg) {
        const title = arg.event.title;

        // Safely retrieve event URL from API
        const eventUrl =
          arg.event.extendedProps?.eventUrl ||
          arg.event._def?.extendedProps?.eventUrl ||
          arg.event.url ||
          '';

        const buttonHtml = eventUrl
          ? `<a href="${eventUrl}" target="_blank"
               style="background:#2b6cb0; color:white; padding:6px 12px; border-radius:8px;
                      font-weight:700; text-decoration:none; display:inline-block;">
               View
             </a>`
          : ``;

        return {
          html: `
            <div style="padding:10px 0;">
              <div style="font-weight:800; font-size:1.3rem;">${title}</div>
              ${buttonHtml ? `<div style="margin-top:10px;">${buttonHtml}</div>` : ``}
            </div>`
        };
      }
    });

    calendar.render();
  }

  initPage();
</script>

</body>
</html>
