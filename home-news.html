<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Southwest Lawn Bowls — What's New</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: #111111;
    padding: 0 0 8px;
  }
  .swd-news-wrap {
    width: 100%;
    max-width: 900px;
  }
  .swd-news-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 18px;
    margin-bottom: 16px;
  }
  .swd-news-head h2 {
    margin: 0;
    font-size: clamp(26px, 3vw, 38px);
    line-height: 1.08;
    color: #111111;
  }
  .swd-news-kicker {
    margin: 0 0 10px;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    color: #6b7280;
  }
  .swd-news-view-all {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 0 18px;
    border-radius: 999px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    background: #ffffff;
    color: #0d3f2f;
    border: 1px solid #cfd8d3;
    flex-shrink: 0;
    transition: transform 0.2s ease;
  }
  .swd-news-view-all:hover { transform: translateY(-1px); }
  .swd-news-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .swd-news-card {
    background: #ffffff;
    border: 1px solid #e6ece8;
    border-left: 4px solid #e6ece8;
    border-radius: 14px;
    padding: 16px 20px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  a.swd-news-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 24px rgba(0,0,0,0.08);
  }
  .swd-news-card[data-type="result"]     { border-left-color: #f0b429; }
  .swd-news-card[data-type="tournament"] { border-left-color: #0d5a43; }
  .swd-news-card[data-type="update"]     { border-left-color: #1a3a5c; }
  .swd-news-card[data-type="news"]       { border-left-color: #c8102e; }
  .swd-news-card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .swd-news-pill {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 999px;
    color: #ffffff;
  }
  .swd-news-pill--result     { background: #b58a00; }
  .swd-news-pill--tournament { background: #0d5a43; }
  .swd-news-pill--update     { background: #1a3a5c; }
  .swd-news-pill--news       { background: #c8102e; }
  .swd-news-date {
    font-size: 12px;
    font-weight: 600;
    color: #6b7280;
  }
  .swd-news-title {
    margin: 0 0 4px;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    color: #111111;
  }
  .swd-news-body {
    margin: 0;
    font-size: 14px;
    line-height: 1.5;
    color: #4b5563;
  }
  .swd-news-arrow {
    display: inline-block;
    margin-top: 8px;
    font-size: 13px;
    font-weight: 700;
    color: #0d5a43;
  }
</style>
</head>
<body>

<div class="swd-news-wrap">
  <div class="swd-news-head">
    <div>
      <p class="swd-news-kicker">Latest Updates</p>
      <h2>What's New</h2>
    </div>
    <a class="swd-news-view-all" href="https://www.swlawnbowls.org/2026-tournament-results" target="_top">All Results →</a>
  </div>
  <div class="swd-news-list" id="swd-news-list">
    <p style="color:#6b7280;font-size:15px;margin:0;">Loading updates…</p>
  </div>
</div>

<script>
(function () {
  const NEWS_TYPE = {
    result:     { label: "Results",    cls: "swd-news-pill--result" },
    tournament: { label: "Tournament", cls: "swd-news-pill--tournament" },
    update:     { label: "Update",     cls: "swd-news-pill--update" },
    news:       { label: "News",       cls: "swd-news-pill--news" }
  };

  function fmtDate(s) {
    const d = new Date(s + "T12:00:00");
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function reportHeight() {
    const h = document.body.scrollHeight;
    if (window.parent !== window) {
      window.parent.postMessage({ type: "swd-home-news-height", height: h }, "*");
    }
  }

  async function loadNews() {
    const el = document.getElementById("swd-news-list");
    if (!el) return;
    try {
      const res = await fetch("/news-data.json?v=" + new Date().getTime());
      const data = await res.json();
      const items = (data.items || []).slice(0, 8);
      el.innerHTML = items.map(item => {
        const c = NEWS_TYPE[item.type] || NEWS_TYPE.news;
        const tag = item.link ? "a" : "div";
        const href = item.link ? ` href="${item.link}" target="_top"` : "";
        return `<${tag} class="swd-news-card" data-type="${item.type}"${href}>
          <div class="swd-news-card-top">
            <span class="swd-news-pill ${c.cls}">${c.label}</span>
            <span class="swd-news-date">${fmtDate(item.date)}</span>
          </div>
          <p class="swd-news-title">${item.title}</p>
          ${item.body ? `<p class="swd-news-body">${item.body}</p>` : ""}
          ${item.link ? `<span class="swd-news-arrow">View →</span>` : ""}
        </${tag}>`;
      }).join("");
    } catch (e) {
      el.innerHTML = '<p style="color:#6b7280;font-size:15px;margin:0;">Updates unavailable right now.</p>';
    }
    reportHeight();
    setTimeout(reportHeight, 300);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", loadNews);
  } else {
    loadNews();
  }
})();
</script>

</body>
</html>
