<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Southwest Lawn Bowls — What's New</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    color: #ffffff;
  }
  .swd-news-wrap {
    background: #111827;
    border-radius: 26px;
    overflow: hidden;
    position: relative;
    padding: 32px 36px 36px;
    box-shadow: 0 14px 30px rgba(0,0,0,0.16);
  }
  .swd-news-wrap::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, #f0b429 0%, #e3b450 50%, #f0b429 100%);
  }
  .swd-news-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 18px;
    margin-bottom: 20px;
  }
  .swd-news-kicker {
    margin: 0 0 10px;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    color: #f0b429;
  }
  .swd-news-head h2 {
    margin: 0;
    font-size: clamp(26px, 3vw, 38px);
    line-height: 1.08;
    color: #ffffff;
    letter-spacing: -0.01em;
  }
  .swd-news-view-all {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    padding: 0 18px;
    border-radius: 999px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    background: transparent;
    color: rgba(255,255,255,0.85);
    border: 1px solid rgba(255,255,255,0.3);
    flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .swd-news-view-all:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.6);
  }
  .swd-news-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .swd-news-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-left: 4px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 16px 20px;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: background 0.2s ease, transform 0.2s ease;
  }
  a.swd-news-card:hover {
    background: rgba(255,255,255,0.1);
    transform: translateY(-1px);
  }
  .swd-news-card[data-type="result"]     { border-left-color: #f0b429; }
  .swd-news-card[data-type="tournament"] { border-left-color: #22c55e; }
  .swd-news-card[data-type="update"]     { border-left-color: #60a5fa; }
  .swd-news-card[data-type="news"]       { border-left-color: #f87171; }
  .swd-news-card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .swd-news-pill {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .swd-news-pill--result     { background: #92700a; color: #fde68a; }
  .swd-news-pill--tournament { background: rgba(34,197,94,0.2); color: #86efac; border: 1px solid rgba(34,197,94,0.35); }
  .swd-news-pill--update     { background: rgba(96,165,250,0.2); color: #bfdbfe; border: 1px solid rgba(96,165,250,0.35); }
  .swd-news-pill--news       { background: rgba(248,113,113,0.2); color: #fca5a5; border: 1px solid rgba(248,113,113,0.35); }
  .swd-news-date {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
  }
  .swd-news-title {
    margin: 0 0 4px;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    color: #ffffff;
  }
  .swd-news-body {
    margin: 0;
    font-size: 14px;
    line-height: 1.5;
    color: rgba(255,255,255,0.65);
  }
  .swd-news-card[data-type="result"]     .swd-news-arrow { color: #f0b429; }
  .swd-news-card[data-type="tournament"] .swd-news-arrow { color: #86efac; }
  .swd-news-card[data-type="update"]     .swd-news-arrow { color: #93c5fd; }
  .swd-news-card[data-type="news"]       .swd-news-arrow { color: #fca5a5; }
  .swd-news-arrow {
    display: inline-block;
    margin-top: 8px;
    font-size: 13px;
    font-weight: 700;
  }
  @media (max-width: 640px) {
    .swd-news-wrap { padding: 24px 20px 28px; border-radius: 0; }
    .swd-news-head { flex-direction: column; align-items: flex-start; gap: 14px; }
  }
</style>
</head>
<body>

<div class="swd-news-wrap">
  <div class="swd-news-head">
    <div>
      <p class="swd-news-kicker">Latest Updates</p>
      <h2>What's New</h2>
    </div>
    <a class="swd-news-view-all" href="https://www.swlawnbowls.org/2026-tournament-results" target="_top">All Results →</a>
  </div>
  <div class="swd-news-list" id="swd-news-list">
    <p style="color:rgba(255,255,255,0.5);font-size:15px;margin:0;">Loading updates…</p>
  </div>
</div>

<script>
(function () {
  const NEWS_TYPE = {
    result:     { label: "Results",    cls: "swd-news-pill--result" },
    tournament: { label: "Tournament", cls: "swd-news-pill--tournament" },
    update:     { label: "Update",     cls: "swd-news-pill--update" },
    news:       { label: "News",       cls: "swd-news-pill--news" }
  };

  function fmtDate(s) {
    const d = new Date(s + "T12:00:00");
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
  }

  function reportHeight() {
    const h = document.body.scrollHeight;
    if (window.parent !== window) {
      window.parent.postMessage({ type: "swd-home-news-height", height: h }, "*");
    }
  }

  async function loadNews() {
    const el = document.getElementById("swd-news-list");
    if (!el) return;
    try {
      const res = await fetch("/news-data.json?v=" + new Date().getTime());
      const data = await res.json();
      const items = (data.items || []).slice(0, 8);
      el.innerHTML = items.map(item => {
        const c = NEWS_TYPE[item.type] || NEWS_TYPE.news;
        const tag = item.link ? "a" : "div";
        const href = item.link ? ` href="${item.link}" target="_top"` : "";
        return `<${tag} class="swd-news-card" data-type="${item.type}"${href}>
          <div class="swd-news-card-top">
            <span class="swd-news-pill ${c.cls}">${c.label}</span>
            <span class="swd-news-date">${fmtDate(item.date)}</span>
          </div>
          <p class="swd-news-title">${item.title}</p>
          ${item.body ? `<p class="swd-news-body">${item.body}</p>` : ""}
          ${item.link ? `<span class="swd-news-arrow">View →</span>` : ""}
        </${tag}>`;
      }).join("");
    } catch (e) {
      el.innerHTML = '<p style="color:rgba(255,255,255,0.5);font-size:15px;margin:0;">Updates unavailable right now.</p>';
    }
    reportHeight();
    setTimeout(reportHeight, 300);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", loadNews);
  } else {
    loadNews();
  }
})();
</script>

</body>
</html>
