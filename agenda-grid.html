<!DOCTYPE html>
<!-- ============================================================
     SWD SEASON AGENDA — spreadsheet-style grid (mirrors the classic
     "SWD Tournament Schedule" sheet members are used to).
     Live data from /api/events?year=YYYY (same source as the calendar).
     - Two event columns: SWD Sponsored vs Club Invitational.
     - Rows color-bar'd by category (Women's/Men's/Club Sponsored/Other/PBA).
     - US holidays + cultural observances as colored bands.
     - "Open" = event still has a link in the calendar (GG curates these);
       the event name becomes the link. No link => plain text (and no stale
       deadline/fee, which the title-matcher could otherwise get wrong).
     - Broadcasts "swd-agenda-height" so an embedding iframe can auto-resize.
     ============================================================ -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SWD Season Agenda</title>
<style>
  :root {
    --ink: #1a2233; --muted: #667085; --grid: #cfd6e0;
    --head: #1e40af; --head-band: #e6ecfb;
  }
  html, body { margin: 0; background: #ffffff; }
  body { font-family: Arial, Helvetica, "Segoe UI", sans-serif; color: var(--ink); -webkit-text-size-adjust: 100%; }
  .wrap { max-width: 1140px; margin: 0 auto; padding: 16px 12px 36px; }

  .cal-head { display: flex; flex-wrap: wrap; align-items: baseline; gap: 6px 16px; }
  .cal-title { font-size: 1.55rem; font-weight: 800; color: var(--head); margin: 0; text-transform: uppercase; letter-spacing: -.01em; }
  .cal-sub { color: var(--muted); font-size: .9rem; }
  .year-tabs { margin-left: auto; display: flex; gap: 6px; }
  .year-tab { border: 1px solid #b9c6ee; background: #eef2fc; color: var(--head); font: inherit; font-size: .85rem; font-weight: 700; padding: 5px 12px; border-radius: 6px; cursor: pointer; }
  .year-tab.active { background: var(--head); color: #fff; border-color: var(--head); }

  .legend { display: flex; flex-wrap: wrap; gap: 7px 13px; margin: 11px 0 12px; }
  .legend .item { display: inline-flex; align-items: center; gap: 6px; font-size: .8rem; color: #344054; font-weight: 700; }
  .legend .dot { width: 12px; height: 12px; border-radius: 3px; display: inline-block; border: 1px solid rgba(0,0,0,.12); }

  .tbl-shell { border: 1px solid var(--grid); border-radius: 8px; overflow: hidden; box-shadow: 0 5px 18px rgba(15,23,42,.06); }
  table.cal { width: 100%; border-collapse: collapse; font-size: .85rem; background: #fff; }
  table.cal th, table.cal td { border: 1px solid var(--grid); padding: 5px 8px; vertical-align: top; text-align: left; }
  table.cal thead th {
    background: var(--head); color: #fff; font-weight: 700; white-space: nowrap;
    text-transform: uppercase; letter-spacing: .03em; font-size: .8rem;
    position: sticky; top: 0; z-index: 2; border-color: #15307e;
  }
  /* tint each event row by its category (legend) color */
  table.cal tbody tr.ev td { background: #ffffff; background: color-mix(in srgb, var(--cat, #94a3b8) 12%, #ffffff); }
  table.cal tbody tr.ev:hover td { background: color-mix(in srgb, var(--cat, #94a3b8) 22%, #ffffff); }

  .col-date { white-space: nowrap; width: 116px; font-weight: 700; color: #25324a; }
  .col-loc { width: 210px; color: #475467; }
  .ev-link { color: var(--head); font-weight: 700; text-decoration: none; }
  .ev-link:hover { text-decoration: underline; }
  .ev-title { font-weight: 700; color: #1a2233; }

  /* category color bar on the date cell */
  tr.ev td.col-date { border-left: 5px solid var(--cat, #94a3b8); }

  tr.month-row td {
    background: var(--head-band); color: var(--head); font-weight: 800;
    text-transform: uppercase; letter-spacing: .06em; font-size: 1.15rem;
    text-align: center; padding: 11px 10px; border-color: #c9d6f5;
  }
  tr.holiday td { background: #fff7e6; color: #92580a; font-weight: 700; font-size: .84rem; }
  tr.holiday td.col-date { border-left: 5px solid #f0b429; white-space: nowrap; }
  tr.obs td { background: #fdecf2; color: #9d1f53; font-weight: 700; font-size: .84rem; }
  tr.obs td.col-date { border-left: 5px solid #db2777; white-space: nowrap; }

  .status { padding: 20px 6px; color: var(--muted); }

  @media (max-width: 640px) {
    table.cal { font-size: .8rem; }
    table.cal th, table.cal td { padding: 5px 6px; }
    .col-date, .col-loc { width: auto; }
    .cal-title { font-size: 1.25rem; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cal-head">
      <h1 class="cal-title">SWD <span id="yearLabel">2026</span> Tournament Schedule</h1>
      <span class="cal-sub" id="countSub"></span>
      <div class="year-tabs" id="yearTabs"></div>
    </div>

    <div class="legend" id="legend"></div>

    <div class="tbl-shell">
      <table class="cal">
        <thead>
          <tr>
            <th class="col-date">Date</th>
            <th>SWD Sponsored</th>
            <th>Club Invitational</th>
            <th class="col-loc">Location</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="4" class="status">Loading calendar…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
  (function () {
    var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    var DOW = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    var CAT = { "Women's":"#059669", "Men's":"#dc2626", "Club Sponsored":"#2563eb", "Other":"#7c3aed", "PBA USA":"#f59e0b" };
    function catColor(s) { return CAT[s] || "#64748b"; }

    var rowsEl = document.getElementById("rows");
    var yearLabel = document.getElementById("yearLabel");
    var countSub = document.getElementById("countSub");

    function getYear() {
      var m = String(location.search).match(/[?&]year=(\d{4})/);
      return m ? parseInt(m[1], 10) : 2026;
    }
    var YEAR = getYear();
    yearLabel.textContent = YEAR;

    (function buildTabs() {
      var tabs = document.getElementById("yearTabs");
      [YEAR - 1, YEAR, YEAR + 1].forEach(function (y) {
        var b = document.createElement("button");
        b.className = "year-tab" + (y === YEAR ? " active" : "");
        b.type = "button"; b.textContent = y;
        b.addEventListener("click", function () { location.search = "?year=" + y; });
        tabs.appendChild(b);
      });
    })();

    // ---------- date helpers ----------
    function nthWeekday(y, m, wd, n) { var d = new Date(y, m, 1); var off = (wd - d.getDay() + 7) % 7; return new Date(y, m, 1 + off + (n - 1) * 7); }
    function lastWeekday(y, m, wd) { var d = new Date(y, m + 1, 0); var off = (d.getDay() - wd + 7) % 7; return new Date(y, m, d.getDate() - off); }
    function easter(y) { // Western (Gregorian) Easter Sunday
      var a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),
          h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
          mo=Math.floor((h+l-7*m+114)/31),da=((h+l-7*m+114)%31)+1;
      return new Date(y, mo-1, da);
    }
    // Jewish holidays vary (lunisolar) — hardcoded first-day dates by year.
    var JEWISH = {
      2025: [["Passover begins",3,13],["Rosh Hashanah",8,23],["Yom Kippur",9,2],["Hanukkah begins",11,15]],
      2026: [["Passover begins",3,2],["Rosh Hashanah",8,12],["Yom Kippur",8,21],["Hanukkah begins",11,5]],
      2027: [["Passover begins",3,22],["Rosh Hashanah",9,2],["Yom Kippur",9,11],["Hanukkah begins",11,25]]
    };

    function specialDays(y) {
      var fed = [
        ["New Year's Day", new Date(y,0,1)],
        ["Martin Luther King Jr. Day", nthWeekday(y,0,1,3)],
        ["Presidents' Day", nthWeekday(y,1,1,3)],
        ["Memorial Day", lastWeekday(y,4,1)],
        ["Juneteenth", new Date(y,5,19)],
        ["Independence Day", new Date(y,6,4)],
        ["Labor Day", nthWeekday(y,8,1,1)],
        ["Columbus Day", nthWeekday(y,9,1,2)],
        ["Veterans Day", new Date(y,10,11)],
        ["Thanksgiving Day", nthWeekday(y,10,4,4)],
        ["Christmas Day", new Date(y,11,25)]
      ].map(function (x) { return { name: x[0], date: x[1], kind: "holiday" }; });

      var obs = [
        ["Valentine's Day", new Date(y,1,14)],
        ["St. Patrick's Day", new Date(y,2,17)],
        ["Easter Sunday", easter(y)],
        ["Cinco de Mayo", new Date(y,4,5)],
        ["Mother's Day", nthWeekday(y,4,0,2)],
        ["Father's Day", nthWeekday(y,5,0,3)],
        ["Halloween", new Date(y,9,31)]
      ].map(function (x) { return { name: x[0], date: x[1], kind: "obs" }; });

      (JEWISH[y] || []).forEach(function (j) {
        obs.push({ name: j[0], date: new Date(y, j[1], j[2]), kind: "obs" });
      });

      return fed.concat(obs);
    }

    function parseISO(d) { if (!d) return null; var p = String(d).split("-"); return p.length < 3 ? null : new Date(+p[0], +p[1]-1, +p[2]); }
    function fmtDate(start, end) {
      var s = start instanceof Date ? start : parseISO(start);
      if (!s) return "";
      var label = DOW[s.getDay()] + ", " + MONTHS[s.getMonth()].slice(0,3) + " " + s.getDate();
      var e = end ? (end instanceof Date ? end : parseISO(end)) : null;
      if (e) { var eAdj = new Date(e.getTime() - 86400000); if (eAdj > s) { var sm = eAdj.getMonth() === s.getMonth(); label += " – " + (sm ? "" : MONTHS[eAdj.getMonth()].slice(0,3) + " ") + eAdj.getDate(); } }
      return label;
    }
    function esc(t) { return String(t == null ? "" : t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function shortLoc(loc) { return loc ? esc(loc.split(",")[0]) : ""; }

    function postHeight() {
      if (window.parent === window) return;
      try { var h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight); window.parent.postMessage({ type: "swd-agenda-height", height: h }, "*"); } catch (e) {}
    }

    function buildLegend(used) {
      var order = ["Women's","Men's","Club Sponsored","Other","PBA USA"];
      var html = order.filter(function (s) { return used[s]; }).map(function (s) {
        return '<span class="item"><span class="dot" style="background:'+CAT[s]+'"></span>'+esc(s)+'</span>';
      }).join("");
      html += '<span class="item"><span class="dot" style="background:#f0b429"></span>Holiday</span>';
      html += '<span class="item"><span class="dot" style="background:#db2777"></span>Observance</span>';
      document.getElementById("legend").innerHTML = html;
    }

    function render(events) {
      events = events.filter(function (e) { return e && e.start; });
      var items = events.map(function (e) { return { type: "event", date: parseISO(e.start), e: e }; });
      specialDays(YEAR).forEach(function (h) { items.push({ type: h.kind, date: h.date, n: h.name }); });
      items.sort(function (a, b) {
        var t = a.date - b.date;
        if (t !== 0) return t;
        var rank = { holiday: 0, obs: 0, event: 1 };
        return (rank[a.type] || 0) - (rank[b.type] || 0);
      });

      var html = "", lastMonthKey = "", used = {}, evCount = 0;
      items.forEach(function (it) {
        var dt = it.date;
        var mk = dt ? (dt.getFullYear() + "-" + dt.getMonth()) : "";
        if (mk && mk !== lastMonthKey) {
          lastMonthKey = mk;
          html += '<tr class="month-row"><td colspan="4">' + MONTHS[dt.getMonth()] + " " + dt.getFullYear() + '</td></tr>';
        }

        if (it.type === "holiday" || it.type === "obs") {
          var emoji = it.type === "holiday" ? "🗓️" : "✨";
          html += '<tr class="' + it.type + '"><td class="col-date">' + esc(fmtDate(dt)) + '</td>' +
                  '<td colspan="3">' + emoji + " " + esc(it.n) + '</td></tr>';
          return;
        }

        var e = it.e;
        evCount++;
        var src = e.source || "Other";
        used[src] = true;
        var open = !!e.eventUrl;
        var name = open
          ? '<a class="ev-link" href="' + esc(e.eventUrl) + '" target="_blank" rel="noopener">' + esc(e.title) + '</a>'
          : '<span class="ev-title">' + esc(e.title) + '</span>';

        var isClub = (src === "Club Sponsored");
        var swdCell = isClub ? "" : name;
        var clubCell = isClub ? name : "";

        html += '<tr class="ev" style="--cat:' + catColor(src) + '">' +
                  '<td class="col-date">' + esc(fmtDate(e.start, e.end)) + '</td>' +
                  '<td class="col-swd">' + swdCell + '</td>' +
                  '<td class="col-club">' + clubCell + '</td>' +
                  '<td class="col-loc">' + shortLoc(e.location) + '</td>' +
                '</tr>';
      });

      rowsEl.innerHTML = html || '<tr><td colspan="4" class="status">No events listed for ' + YEAR + ' yet.</td></tr>';
      countSub.textContent = evCount + " events";
      buildLegend(used);
      postHeight();
    }

    fetch("/api/events?year=" + YEAR, { cache: "no-store" })
      .then(function (r) { return r.json(); })
      .then(function (j) { render(Array.isArray(j) ? j : (j.events || j.data || [])); })
      .catch(function () { rowsEl.innerHTML = '<tr><td colspan="4" class="status">Could not load the calendar. Please refresh.</td></tr>'; postHeight(); });

    if (window.ResizeObserver) new ResizeObserver(postHeight).observe(document.body);
    window.addEventListener("load", postHeight);
  })();
  </script>
</body>
</html>
