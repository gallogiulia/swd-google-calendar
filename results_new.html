<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Tournament Results — Southwest Lawn Bowls</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; }

  .swlb-results {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    max-width: 1080px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* ── ANCHOR NAV ── */
  .swlb-nav-wrap {
    position: sticky; top: 0; z-index: 10;
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    margin-bottom: 40px;
  }
  .swlb-nav {
    display: flex; gap: 0; overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    scroll-behavior: smooth;
  }
  .swlb-nav::-webkit-scrollbar { display: none; }
  /* Scroll affordance: fading edge + chevron, shown only when more nav scrolls that way */
  .swlb-nav-arrow {
    position: absolute; top: 0; bottom: 1px; width: 52px;
    border: none; padding: 0; margin: 0; cursor: pointer;
    display: none; align-items: center; z-index: 2; color: #111;
  }
  .swlb-nav-arrow.show { display: flex; }
  .swlb-nav-arrow.left {
    left: 0; justify-content: flex-start;
    background: linear-gradient(to right, #fff 50%, rgba(255,255,255,0));
  }
  .swlb-nav-arrow.right {
    right: 0; justify-content: flex-end;
    background: linear-gradient(to left, #fff 50%, rgba(255,255,255,0));
  }
  .swlb-nav-arrow svg { width: 20px; height: 20px; }
  .swlb-nav-arrow.left svg  { margin-left: 4px; }
  .swlb-nav-arrow.right svg { margin-right: 4px; }
  .swlb-nav-arrow:hover { color: #1a5fa8; }
  .swlb-nav a {
    font-size: 13px; color: #555;
    padding: 10px 16px; white-space: nowrap;
    border-bottom: 2px solid transparent;
    text-decoration: none; margin-bottom: -1px;
    flex-shrink: 0;
    transition: color .15s, border-color .15s;
  }
  .swlb-nav a:hover { color: #111; border-bottom-color: #111; }

  /* ── TOURNAMENT SECTION ── */
  .swlb-section { margin-bottom: 56px; scroll-margin-top: 60px; }
  .swlb-section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 6px; gap: 16px; flex-wrap: wrap;
  }
  .swlb-section-title { font-size: 20px; font-weight: 600; color: #111; letter-spacing: -0.3px; }
  .swlb-section-meta { font-size: 12px; color: #999; }
  .swlb-section-divider { border: none; border-top: 1px solid #e5e5e5; margin: 10px 0 20px; }
  .swlb-green-label {
    font-size: 11px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: #999;
    margin: 24px 0 12px;
  }
  .swlb-green-label:first-of-type { margin-top: 0; }

  /* ── GRID ── */
  .swlb-grid   { display: grid; grid-template-columns: 1fr 1fr;     gap: 12px; }
  .swlb-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  @media (max-width: 600px) {
    .swlb-grid, .swlb-grid-3 { grid-template-columns: 1fr; }
  }

  /* ── CARD ── */
  .swlb-card {
    border-radius: 10px; overflow: hidden;
    background: #fff; border: 1px solid #e8e8e8;
  }
  .swlb-card-photo {
    position: relative; aspect-ratio: 4/3;
    overflow: hidden; background: #0f1a0f;
  }
  .swlb-card-photo img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
    display: block; transition: transform .4s ease;
  }
  .swlb-card:hover .swlb-card-photo img { transform: scale(1.03); }
  .swlb-card-photo.no-photo {
    background: linear-gradient(135deg, #1e3a1e, #0f1a0f);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: .08em;
    text-transform: uppercase;
  }
  .swlb-card-fade {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(transparent, rgba(0,0,0,.6));
    pointer-events: none;
  }
  .swlb-rank {
    position: absolute; top: 8px; left: 8px;
    font-size: 10px; font-weight: 700; letter-spacing: .05em;
    border-radius: 4px; padding: 3px 8px; color: #fff;
  }
  .swlb-rank.gold   { background: rgba(160,110,0,.8); }
  .swlb-rank.silver { background: rgba(70,80,90,.75); }
  .swlb-rank.bronze { background: rgba(130,70,20,.75); }
  .swlb-rank.other  { background: rgba(30,30,30,.65); }
  .swlb-card-body { padding: 12px 14px 14px; }
  .swlb-card-names { font-size: 14px; font-weight: 600; color: #111; line-height: 1.35; margin-bottom: 8px; }
  .swlb-card-link {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: #1a5fa8;
    text-decoration: none; font-weight: 500;
  }
  .swlb-card-link:hover { text-decoration: underline; }
  .swlb-card-link svg { width: 11px; height: 11px; flex-shrink: 0; }

  .swlb-loading { padding: 60px 0; text-align: center; color: #999; font-size: 14px; }
  .swlb-error   { padding: 20px; border-radius: 8px; background: #fff3f3; color: #8a1c1c; border: 1px solid #f0c0c0; font-size: 14px; }
</style>
</head>
<body>

<div class="swlb-results">
  <div class="swlb-nav-wrap">
    <button class="swlb-nav-arrow left" id="swlb-nav-left" type="button" aria-label="Scroll to earlier tournaments">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <nav class="swlb-nav" id="swlb-nav"></nav>
    <button class="swlb-nav-arrow right" id="swlb-nav-right" type="button" aria-label="Scroll to more tournaments">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
  <div id="swlb-sections"><div class="swlb-loading">Loading tournament results…</div></div>
</div>

<script>
(async function () {
  const navEl      = document.getElementById('swlb-nav');
  const sectionsEl = document.getElementById('swlb-sections');

  let data;
  try {
    const res = await fetch('/results-data.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch (e) {
    sectionsEl.innerHTML = '<div class="swlb-error">Could not load results data: ' + e.message + '</div>';
    return;
  }

  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  const rankStyle = (r) => {
    if (r === 1 || r === '1') return 'gold';
    if (r === 2 || r === '2') return 'silver';
    if (r === 3 || r === '3') return 'bronze';
    return 'other';
  };
  const rankLabel = (r) => {
    if (typeof r === 'number') {
      if (r === 1) return '1st Place';
      if (r === 2) return '2nd Place';
      if (r === 3) return '3rd Place';
      return r + 'th Place';
    }
    return r;
  };

  navEl.innerHTML = data.tournaments
    .map(t => `<a href="#${esc(t.id)}">${esc(t.navLabel || t.title)}</a>`)
    .join('');

  // ── Horizontal-scroll affordance for the nav ──
  const leftBtn  = document.getElementById('swlb-nav-left');
  const rightBtn = document.getElementById('swlb-nav-right');
  function updateNavArrows() {
    const max = navEl.scrollWidth - navEl.clientWidth;
    const x = navEl.scrollLeft;
    leftBtn.classList.toggle('show', x > 4);
    rightBtn.classList.toggle('show', x < max - 4);
  }
  leftBtn.addEventListener('click',  () => navEl.scrollBy({ left: -240, behavior: 'smooth' }));
  rightBtn.addEventListener('click', () => navEl.scrollBy({ left:  240, behavior: 'smooth' }));
  navEl.addEventListener('scroll', updateNavArrows, { passive: true });
  window.addEventListener('resize', updateNavArrows);
  updateNavArrows();
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(updateNavArrows);

  sectionsEl.innerHTML = data.tournaments.map(t => {
    const divisionsHtml = t.divisions.map(div => {
      const gridClass = div.columns === 3 ? 'swlb-grid-3' : 'swlb-grid';
      const divLabel = div.label ? `<div class="swlb-green-label">${esc(div.label)}</div>` : '';
      const cards = div.places.map(p => {
        const style = p.rankStyle || rankStyle(p.rank);
        const label = rankLabel(p.rank);
        const photoBlock = p.photo
          ? `<img src="${esc(p.photo)}" alt="${esc(label)} — ${esc(p.names)}" loading="lazy">`
          : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.4); font-size:11px; letter-spacing:.08em; text-transform:uppercase;">Photo coming soon</div>`;
        return `
          <div class="swlb-card">
            <div class="swlb-card-photo${p.photo ? '' : ' no-photo'}">
              ${photoBlock}
              ${p.photo ? '<div class="swlb-card-fade"></div>' : ''}
              <span class="swlb-rank ${style}">${esc(label)}</span>
            </div>
            <div class="swlb-card-body">
              <div class="swlb-card-names">${esc(p.names)}</div>
              <a class="swlb-card-link" href="${esc(t.eventUrl)}">
                <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6h8M6 2l4 4-4 4"/></svg>
                View full results
              </a>
            </div>
          </div>`;
      }).join('');
      return divLabel + `<div class="${gridClass}">${cards}</div>`;
    }).join('');

    return `
      <div class="swlb-section" id="${esc(t.id)}">
        <div class="swlb-section-header">
          <div class="swlb-section-title">${esc(t.title)}</div>
          <div class="swlb-section-meta">${esc(t.meta)}</div>
        </div>
        <hr class="swlb-section-divider">
        ${divisionsHtml}
      </div>`;
  }).join('');
})();
</script>
</body>
</html>
