<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Subscribe to Calendars</title>
    <style>
      :root{
        --bg: #0b1220;
        --card: rgba(255,255,255,0.06);
        --stroke: rgba(255,255,255,0.12);
        --text: rgba(255,255,255,0.92);
        --muted: rgba(255,255,255,0.70);
        --shadow: 0 10px 30px rgba(0,0,0,0.35);
        --radius: 16px;
      }

      body{
        margin:0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
        background: radial-gradient(1200px 600px at 15% 10%, rgba(64,140,255,0.25), transparent 60%),
                    radial-gradient(900px 500px at 85% 30%, rgba(170,70,255,0.18), transparent 55%),
                    var(--bg);
        color: var(--text);
      }

      .wrap{
        max-width: 980px;
        margin: 0 auto;
        padding: 28px 18px;
      }

      .card{
        background: var(--card);
        border: 1px solid var(--stroke);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 18px;
      }

      .header{
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        gap: 14px;
        margin-bottom: 16px;
      }

      h2{
        margin:0;
        font-size: 18px;
        line-height: 1.2;
        letter-spacing: 0.2px;
      }

      .sub{
        margin:6px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .grid{
        display:grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      @media (max-width: 980px){
        .grid{ grid-template-columns: repeat(3, minmax(0,1fr)); }
      }
      @media (max-width: 640px){
        .grid{ grid-template-columns: repeat(2, minmax(0,1fr)); }
      }

      .btn{
        position: relative;
        display:flex;
        flex-direction:column;
        justify-content:center;
        gap: 4px;
        text-decoration:none;
        border-radius: 14px;
        padding: 14px 12px;
        border: 1px solid rgba(255,255,255,0.16);
        background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.05));
        transition: transform .12s ease, border-color .12s ease, background .12s ease;
        min-height: 76px;
      }
      .btn:hover{
        transform: translateY(-1px);
        border-color: rgba(255,255,255,0.28);
        background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06));
      }
      .btn:active{ transform: translateY(0px); }

      .label{
        font-weight: 650;
        font-size: 13px;
        letter-spacing: 0.2px;
        color: var(--text);
      }
      .hint{
        font-size: 12px;
        color: var(--muted);
        line-height: 1.25;
      }

      .badge{
        position:absolute;
        top: 10px;
        right: 10px;
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.18);
        color: rgba(255,255,255,0.78);
        background: rgba(255,255,255,0.06);
      }

      .footer{
        margin-top: 12px;
        display:flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items:center;
        color: var(--muted);
        font-size: 12px;
      }

      .small-link{
        color: rgba(255,255,255,0.82);
        text-decoration: none;
        border-bottom: 1px dotted rgba(255,255,255,0.35);
      }
      .small-link:hover{
        border-bottom-color: rgba(255,255,255,0.7);
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card" role="region" aria-label="Calendar subscribe buttons">
        <div class="header">
          <div>
            <h2>Subscribe to SWD Calendars</h2>
            <p class="sub">
              Buttons open Google Calendar subscription pages. Use these as “Subscribe” calls-to-action.
            </p>
          </div>
        </div>

        <div id="buttons" class="grid"></div>

        <div class="footer">
          <span>Tip: For Apple/Outlook users, also publish the public <code>.ics</code> links on a separate page.</span>
        </div>
      </div>
    </div>

    <script>
      // Google Calendar "Subscribe" URL format:
      // https://calendar.google.com/calendar/render?cid=<CALENDAR_ID>

      const calendars = [
        {
          name: "Calendar 1",
          cid: "YTVhMGQwNDY3ZTlkM2IzMmU5MDQ3YTgxMDE1MzZmMzY2NTc1OTI3ODVlY2ZmMDc4NTQ5YjAwOTc5ZDg0YTU5MEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t",
          status: "Live"
        },
        {
          name: "Calendar 2",
          cid: "MWE2ZDRhYTkyZmM4OGQ2ZjZlZjA2OTJmM2I0NTkwMGNjZTAyOTdiNjFlNzZhNDZiOWM2MTQwMWIyMDM5OGQ2NUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t",
          status: "Live"
        },
        {
          name: "Calendar 3",
          cid: "REPLACE_WITH_NEW_CALENDAR_ID_3",
          status: "Placeholder"
        },
        {
          name: "Calendar 4",
          cid: "REPLACE_WITH_NEW_CALENDAR_ID_4",
          status: "Placeholder"
        },
        {
          name: "Calendar 5",
          cid: "REPLACE_WITH_NEW_CALENDAR_ID_5",
          status: "Placeholder"
        }
      ];

      const container = document.getElementById("buttons");

      calendars.forEach(c => {
        const url = "https://calendar.google.com/calendar/render?cid=" + encodeURIComponent(c.cid);

        const a = document.createElement("a");
        a.className = "btn";
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.setAttribute("aria-label", `Subscribe to ${c.name} in Google Calendar`);

        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = c.status;

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = c.name;

        const hint = document.createElement("div");
        hint.className = "hint";
        hint.textContent = "Subscribe in Google Calendar";

        a.appendChild(badge);
        a.appendChild(label);
        a.appendChild(hint);

        // If placeholder, visually disable but keep obvious what to edit
        if (c.status === "Placeholder") {
          a.style.opacity = "0.6";
          a.style.pointerEvents = "none";
          hint.textContent = "Add calendar ID first";
        }

        container.appendChild(a);
      });
    </script>
  </body>
</html>
