<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SWD Bowls Calendar</title>

  <!-- FullCalendar (free, via CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="page">
    <header class="header">
      <div>
        <h1>Events Calendar</h1>
        <p class="sub">Southwest Division Bowls</p>
      </div>
      <div class="controls">
        <input id="search" type="search" placeholder="Search events…" />
        <select id="range" aria-label="Date range">
          <option value="30">Next 30 days</option>
          <option value="90">Next 90 days</option>
          <option value="180" selected>Next 180 days</option>
          <option value="365">Next 365 days</option>
        </select>
      </div>
    </header>

    <div class="card">
      <div id="calendar"></div>
    </div>

    <footer class="footer">
      <a id="openGoogle" href="https://calendar.google.com" target="_blank" rel="noopener">Open in Google Calendar</a>
    </footer>
  </div>

  <script>
    // Choose endpoint automatically:
    // - Vercel: /api/events
    // - Netlify: /.netlify/functions/events
    const EVENTS_ENDPOINT =
      (window.__EVENTS_ENDPOINT__ && String(window.__EVENTS_ENDPOINT__)) ||
      (location.hostname.includes('netlify') ? '/.netlify/functions/events' : '/api/events');

    const calendarEl = document.getElementById('calendar');
    const searchEl = document.getElementById('search');
    const rangeEl = document.getElementById('range');

    let allEvents = [];
    let calendar;

    async function fetchEvents(days) {
      const res = await fetch(`${EVENTS_ENDPOINT}?days=${encodeURIComponent(days)}`, { cache: 'no-store' });
      if (!res.ok) {
        const txt = await res.text().catch(() => '');
        throw new Error(`Failed to load events: ${res.status} ${txt}`);
      }
      const data = await res.json();
      return (data && data.events) ? data.events : [];
    }

    function normalizeToFullCalendar(events) {
      return events.map(e => ({
        id: e.id,
        title: e.title || '(Untitled)',
        start: e.start,
        end: e.end || undefined,
        allDay: !!e.allDay,
        url: e.htmlLink || undefined,
        extendedProps: {
          location: e.location || '',
          description: e.description || '',
          source: e.source || ''
        }
      }));
    }

    function applySearch(query) {
      const q = (query || '').trim().toLowerCase();
      if (!q) return allEvents;
      return allEvents.filter(e => {
        const hay = `${e.title || ''} ${e.location || ''} ${e.description || ''} ${e.source || ''}`.toLowerCase();
        return hay.includes(q);
      });
    }

    function renderCalendar() {
      if (calendar) calendar.destroy();

      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'listMonth',      // best UX default for clubs
        height: 'auto',
        expandRows: true,
        nowIndicator: true,
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'listMonth,dayGridMonth'
        },
        views: {
          listMonth: { buttonText: 'List' },
          dayGridMonth: { buttonText: 'Month' }
        },
        events: normalizeToFullCalendar(allEvents),

        eventDidMount: function(info) {
          // Add compact secondary line in list view
          const loc = info.event.extendedProps.location;
          if (loc && info.el && info.el.querySelector) {
            const titleEl = info.el.querySelector('.fc-list-event-title');
            if (titleEl && !titleEl.querySelector('.swd-loc')) {
              const div = document.createElement('div');
              div.className = 'swd-loc';
              div.style.opacity = '0.7';
              div.style.fontSize = '0.9em';
              div.textContent = loc;
              titleEl.appendChild(div);
            }
          }
        },

        eventClick: function(info) {
          // Prefer opening your event in Google (new tab) if htmlLink exists
          if (info.event.url) {
            info.jsEvent.preventDefault();
            window.open(info.event.url, '_blank', 'noopener');
          }
        }
      });

      calendar.render();
    }

    async function loadAndRender() {
      calendarEl.innerHTML = '<p style="padding:16px">Loading events…</p>';
      const days = Number(rangeEl.value || '180');
      allEvents = await fetchEvents(days);
      renderCalendar();
    }

    // Wire up controls
    searchEl.addEventListener('input', () => {
      const filtered = applySearch(searchEl.value);
      const source = normalizeToFullCalendar(filtered);
      calendar.removeAllEventSources();
      calendar.addEventSource(source);
    });

    rangeEl.addEventListener('change', async () => {
      searchEl.value = '';
      await loadAndRender();
    });

    // Init
    loadAndRender().catch(err => {
      console.error(err);
      calendarEl.innerHTML = '<p style="padding:16px">Calendar failed to load. Check API key + calendar IDs.</p>';
    });
  </script>
</body>
</html>
