<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <!-- FullCalendar -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <!-- ✅ REAL LIST STYLING (THIS IS THE KEY) -->
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 12px;
      background: #fafafa;
    }

    #cal {
      background: white;
      border-radius: 12px;
      padding: 8px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      align-items: center;
      margin: 0 0 10px;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      color: #111827;
    }

    .legend .item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      font-size: 0.95rem;
    }

    .legend .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      display: inline-block;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    }

    /* Date header rows */
    .fc-list-day-cushion {
      background: #f1f1f1;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 6px;
      margin-top: 12px;
    }

    /* Event rows */
    .fc-list-event {
      border-bottom: 1px solid #e5e7eb;
    }

    .fc-event-location {
  font-size: 0.85em;
  color: #6b7280;
  margin-top: 2px;
}

    .fc-list-event-title {
      font-weight: 600;
      padding: 6px 0;
    }

    .fc-list-event-time {
      color: #6b7280;
      font-size: 0.9em;
    }

    /* Remove weird borders */
    .fc-theme-standard td,
    .fc-theme-standard th {
      border: none;
    }
  </style>
</head>

<body>


<div class="legend" aria-label="Calendar legend">
  <span class="item"><span class="swatch" style="background:#059669"></span>Women’s</span>
  <span class="item"><span class="swatch" style="background:#dc2626"></span>Men’s</span>
  <span class="item"><span class="swatch" style="background:#2563eb"></span>Club Sponsored</span>
  <span class="item"><span class="swatch" style="background:#7c3aed"></span>Other Tournaments</span>
  <span class="item"><span class="swatch" style="background:#f59e0b"></span>PBA</span>
</div>

<div id=cal></div>
<script>
function getYear(){
  const u = new URL(window.location.href);
  const y = Number(u.searchParams.get("year") || "");
  return (y && Number.isFinite(y)) ? y : 2026;
}

const YEAR = getYear();

fetch(`/api/events?year=${YEAR}`).then(r => r.json()).then(d => {


 new FullCalendar.Calendar(document.getElementById("cal"), {
  initialView: "listMonth",
  initialDate: `${YEAR}-01-01`,
  validRange: { start: `${YEAR}-01-01`, end: `${YEAR+1}-01-01` },
  nowIndicator: false,
  height: "auto",
  eventDisplay: "block",
  displayEventTime: false,


  headerToolbar: {
    left: "prev,next",
    center: "title",
    right: "listMonth,dayGridMonth"
  },

  views: {
    listMonth: { buttonText: "List" },
    dayGridMonth: { buttonText: "Month" }
  },

  events: d.events,

  eventContent(arg) {
    const loc = shortLocation(arg.event.extendedProps.location);
    const title = arg.event.title;

    return {
      html: `
        <div>
          <div class="fc-list-event-title">${title}</div>
          ${loc ? `<div class="fc-event-location">${loc}</div>` : ""}
        </div>
      `
    };
  }
}).render();
});
</script>


</body></html>
