
<!doctype html><html><body>
<h3>Next Events</h3><div id=l></div>
<script>
function getYear(){
  const u = new URL(window.location.href);
  const y = Number(u.searchParams.get("year") || "");
  return (y && Number.isFinite(y)) ? y : 2026;
}

const YEAR = getYear();

fetch(`/api/events?year=${YEAR}`).then(r=>r.json()).then(d=>{
 const today = new Date();
 d.events
  .filter(e => new Date(e.start) >= today)
  .slice(0,5)
  .forEach(e=>{
  const p=document.createElement("p");
  p.textContent=new Date(e.start).toLocaleDateString()+" — "+e.title;
  l.appendChild(p);
 });
});
</script></body></html>
