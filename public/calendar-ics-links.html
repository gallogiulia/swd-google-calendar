<!-- File: /public/calendar-ics-links.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Subscribe (Apple/Outlook)</title>

    <style>
      :root{
        --bg:#ffffff;
        --card:#ffffff;
        --stroke:#e2e2e2;
        --text:#111111;
        --muted:#666666;
        --shadow:0 4px 12px rgba(0,0,0,0.08);
        --radius:12px;
      }

      body{
        margin:0;
        font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        background:var(--bg);
        color:var(--text);
      }

      .wrap{max-width:980px;margin:0 auto;padding:14px;}
      .card{
        background:var(--card);
        border:1px solid var(--stroke);
        border-radius:var(--radius);
        box-shadow:var(--shadow);
        padding:16px;
      }

      h2{margin:0;font-size:18px;font-weight:650;}
      .sub{margin:6px 0 14px;color:var(--muted);font-size:13px;line-height:1.35;}

      .list{display:flex;flex-direction:column;gap:10px;}

      .row{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:12px;
        padding:12px;
        border-radius:10px;
        border:1px solid var(--stroke);
        background:#fff;
      }

      .left{min-width:0;display:flex;flex-direction:column;gap:4px;}
      .name{font-size:14px;font-weight:650;line-height:1.2;}
      .meta{font-size:12px;color:var(--muted);line-height:1.25;}

      .right{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}

      .btn{
        text-decoration:none;
        display:inline-flex;
        align-items:center;
        justify-content:center;
        padding:8px 10px;
        border-radius:10px;
        border:1px solid #cfcfcf;
        background:#fff;
        color:#111;
        font-size:12px;
        font-weight:600;
        white-space:nowrap;
        transition:background .15s ease,border-color .15s ease,transform .1s ease;
      }
      .btn:hover{background:#f5f5f5;border-color:#a9a9a9;transform:translateY(-1px);}
      .btn.primary{border-color:#111;background:#111;color:#fff;}
      .btn.primary:hover{background:#222;border-color:#222;}

      .note{
        margin-top:12px;
        font-size:12px;
        color:var(--muted);
        line-height:1.35;
      }

      @media (max-width: 640px){
        .row{flex-direction:column;align-items:flex-start;}
        .right{width:100%;justify-content:flex-start;}
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card" role="region">
        <h2>Subscribe for Apple Calendar / Outlook</h2>
        <div class="sub">
          Click <b>Open .ics</b> to subscribe in Apple Calendar or Outlook.
        </div>

        <div id="list" class="list"></div>

      </div>
    </div>
    <script>

  const icsFeeds = [
        {
          name: "2026 SWD Tournaments - Men's",
          ics: "https://calendar.google.com/calendar/u/1?cid=MmJhODI4NzQ2YmIwZjZjYTAwNDdkZTNiYzA4NWEyYWUyOTYzMjIxMmFjOWM0ZjQ4ZmU4ZGViMWQ0NmE3MzJkZkBncm91cC5jYWxlbmRhci5nb29nbGUuY29t",
          googleCid: "MmJhODI4NzQ2YmIwZjZjYTAwNDdkZTNiYzA4NWEyYWUyOTYzMjIxMmFjOWM0ZjQ4ZmU4ZGViMWQ0NmE3MzJkZkBncm91cC5jYWxlbmRhci5nb29nbGUuY29t"
        },
        {
          name: "2026 SWD Tournaments - Women's",
          ics: "https://calendar.google.com/calendar/u/1?cid=MDhlMjQ2ODAxMGZhYjM1NDBhN2I3YzUzZjUwYTE3NmVlMzgyNGNiNzAwYjNhZmJlZThmNzA2OTQ5ZTA0Mzc4M0Bncm91cC5jYWxlbmRhci5nb29nbGUuY29t",
          googleCid: "MDhlMjQ2ODAxMGZhYjM1NDBhN2I3YzUzZjUwYTE3NmVlMzgyNGNiNzAwYjNhZmJlZThmNzA2OTQ5ZTA0Mzc4M0Bncm91cC5jYWxlbmRhci5nb29nbGUuY29t"
        },
      {
          name: "2026 Club Sponsored Events",
          ics: "https://calendar.google.com/calendar/u/1?cid=YTVhMGQwNDY3ZTlkM2IzMmU5MDQ3YTgxMDE1MzZmMzY2NTc1OTI3ODVlY2ZmMDc4NTQ5YjAwOTc5ZDg0YTU5MEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t",
          googleCid: "YTVhMGQwNDY3ZTlkM2IzMmU5MDQ3YTgxMDE1MzZmMzY2NTc1OTI3ODVlY2ZmMDc4NTQ5YjAwOTc5ZDg0YTU5MEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t"
        },
        {
          name: "2026 Other Tournaments",
          ics: "https://calendar.google.com/calendar/u/1?cid=MWE2ZDRhYTkyZmM4OGQ2ZjZlZjA2OTJmM2I0NTkwMGNjZTAyOTdiNjFlNzZhNDZiOWM2MTQwMWIyMDM5OGQ2NUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t",
          googleCid: "MWE2ZDRhYTkyZmM4OGQ2ZjZlZjA2OTJmM2I0NTkwMGNjZTAyOTdiNjFlNzZhNDZiOWM2MTQwMWIyMDM5OGQ2NUBncm91cC5jYWxlbmRhci5nb29nbGUuY29t"
        },
        {
          name: "2026 PBA",
          ics: "https://calendar.google.com/calendar/u/1?cid=MGM4NGUwNmMzZWNjMTU1NTg0ODkxMTE1NWVlOWQwNWU5MjM0YjQ3YmFmNGFhODc3NzljMDE1OTM0ZGViNmM5NEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t",
          googleCid: "MGM4NGUwNmMzZWNjMTU1NTg0ODkxMTE1NWVlOWQwNWU5MjM0YjQ3YmFmNGFhODc3NzljMDE1OTM0ZGViNmM5NEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t"
        },
      ];

      const list = document.getElementById("list");

      icsFeeds.forEach(item => {
        const row = document.createElement("div");
        row.className = "row";

        const left = document.createElement("div");
        left.className = "left";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = item.name;

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = "Apple / Outlook subscription link";

        left.appendChild(name);
        left.appendChild(meta);

        const right = document.createElement("div");
        right.className = "right";

        const openIcs = document.createElement("a");
        openIcs.className = "btn primary";
        openIcs.href = item.ics;
        openIcs.target = "_blank";
        openIcs.rel = "noopener noreferrer";
        openIcs.textContent = "Open .ics";

        const google = document.createElement("a");
        google.className = "btn";
        google.href = "https://calendar.google.com/calendar/render?cid=" + encodeURIComponent(item.googleCid);
        google.target = "_blank";
        google.rel = "noopener noreferrer";
        google.textContent = "Google subscribe";

        right.appendChild(openIcs);
        right.appendChild(google);

        row.appendChild(left);
        row.appendChild(right);
        list.appendChild(row);
      });
    </script>
  </body>
</html>
