<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>SWD Events – Agenda</title>

  <!-- FullCalendar -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      margin: 0;
      padding: 16px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 16px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.4rem;
    }

    .fc-header-toolbar {
      display: none; /* no navigation */
    }

    .fc-list-day-cushion {
      background: #f1f1f1;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 12px;
    }

    .fc-list-event {
      border-bottom: 1px solid #e5e7eb;
    }

    .fc-list-event-title {
      font-weight: 600;
    }

    .fc-list-event-time {
      display: none !important;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }
      .container {
        box-shadow: none;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Southwest Division Bowls – Events Agenda</h1>
    <div id="agenda"></div>
  </div>

  <script>
    fetch("/api/events?days=365")
      .then(r => r.json())
      .then(d => {
        new FullCalendar.Calendar(document.getElementById("agenda"), {
          initialView: "listYear",
          initialDate: new Date(),
          height: "auto",
          events: d.events
        }).render();
      });
  </script>

</body>
</html>
