<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SWD Events – Agenda</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      margin: 0;
      padding: 16px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 16px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      align-items: center;
      margin: 0 0 8px;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
      background: #fafafa;
      color: #111827;
      font-size: 0.95rem;
    }

    /* NEW: Info bar for link logic */
    .info-bar {
      margin: 0 0 12px;
      padding: 8px 12px;
      border: 1px solid #e5e7eb;
      border-top: none;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      background: #fdfcf0;
      color: #856404;
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .legend .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      display: inline-block;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
    }

    .fc-list-event { transition: background 0.1s; }
    .fc-list-event.is-clickable { cursor: pointer; }
    .fc-list-event.is-clickable:hover { background: #f0f7ff !important; }
    .fc-header-toolbar { display: none; }
    .fc-list-day-cushion { background: #f1f1f1; font-weight: 700; padding: 8px 12px; border-radius: 8px; margin-top: 12px; }
    .fc-list-event-title { font-weight: 600; }
    .fc-list-event-time, .fc-event-time { display: none !important; }
    .fc-event-location { font-size: 0.85em; color: #6b7280; margin-top: 2px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Southwest Division Bowls – Events Agenda</h1>
    
    <div class="legend" aria-label="Calendar legend">
      <span class="item"><span class="swatch" style="background:#059669"></span> Women’s</span>
      <span class="item"><span class="swatch" style="background:#dc2626"></span> Men’s</span>
      <span class="item"><span class="swatch" style="background:#2563eb"></span> Club Sponsored</span>
      <span class="item"><span class="swatch" style="background:#7c3aed"></span> Other Tournaments</span>
      <span class="item"><span class="swatch" style="background:#f59e0b"></span> PBA</span>
    </div>

    <div class="info-bar">
      <strong>Note:</strong> Registration links (🔗) typically become active <strong>30 days</strong> before an event begins. If an event is more than 30 days away, the link will show as "Registration opens soon."
    </div>

    <div id="agenda"></div>
  </div>

  <script>
    function shortLocation(loc) {
      if (!loc) return "";
      return String(loc).split(",")[0].trim();
    }

    function getYear(){
      const u = new URL(window.location.href);
      const y = Number(u.searchParams.get("year") || "");
      return (y && Number.isFinite(y)) ? y : 2026;
    }

    const YEAR = getYear();

    fetch(`/api/events?year=${YEAR}`)
      .then(r => r.json())
      .then(d => {
        new FullCalendar.Calendar(document.getElementById("agenda"), {
          initialView: "listYear",
          initialDate: `${YEAR}-01-01`,
          validRange: { start: `${YEAR}-01-01`, end: `${YEAR+1}-01-01` },
          nowIndicator: false,
          headerToolbar: false,
          height: "auto",
          events: d.events,

          eventClick: function(info) {
            const url = info.event.extendedProps.eventUrl;
            const eventStart = new Date(info.event.start);
            const now = new Date();
            const daysUntil = (eventStart - now) / (1000 * 60 * 60 * 24);
            const isLive = daysUntil <= 30;

            if (url && isLive) {
              window.open(url, '_blank'); 
            } else if (url && !isLive) {
              alert("Registration for '" + info.event.title + "' is not yet open. It typically opens 30 days before the event.");
            } else {
              alert("The registration link for this event is not yet available.");
            }
          },

          eventDidMount: function(info) {
            const url = info.event.extendedProps.eventUrl;
            const eventStart = new Date(info.event.start);
            const now = new Date();
            const daysUntil = (eventStart - now) / (1000 * 60 * 60 * 24);
            if (url && daysUntil <= 30) {
              info.el.classList.add('is-clickable');
            }
          },

          eventContent(arg) {
            const loc = shortLocation(arg.event.extendedProps.location);
            const title = arg.event.title;
            const url = arg.event.extendedProps.eventUrl;
            const eventStart = new Date(arg.event.start);
            const now = new Date();
            const daysUntil = (eventStart - now) / (1000 * 60 * 60 * 24);
            
            const hasLink = !!url;
            const isReady = hasLink && daysUntil <= 30;

            let statusHtml = '';
            if (!hasLink) {
              statusHtml = `<div style="font-size:0.75em; color:#9ca3af; font-weight:normal; margin-top:2px;">Link coming soon</div>`;
            } else if (!isReady) {
              statusHtml = `<div style="font-size:0.75em; color:#f59e0b; font-weight:normal; margin-top:2px;">Registration opens soon</div>`;
            }

            return {
              html: `
                <div>
                  <div class="fc-list-event-title">
                    ${title} ${isReady ? '<span style="color:#2563eb; margin-left:4px;">🔗</span>' : ''}
                  </div>
                  ${loc ? `<div class="fc-event-location">${loc}</div>` : ""}
                  ${statusHtml}
                </div>
              `
            };
          }
        }).render();
      });
  </script>
</body>
</html>
