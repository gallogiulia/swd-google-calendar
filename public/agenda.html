<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SWD Events – Agenda</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fafafa; margin: 0; padding: 16px; }
    .container { max-width: 900px; margin: 0 auto; background: #fff; border-radius: 16px; padding: 16px; }
    .legend { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; margin: 0 0 8px; padding: 10px 12px; border: 1px solid #e5e7eb; border-top-left-radius: 12px; border-top-right-radius: 12px; background: #fafafa; color: #111827; font-size: 0.95rem; }
    .info-bar { margin: 0 0 12px; padding: 8px 12px; border: 1px solid #e5e7eb; border-top: none; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; background: #fdfcf0; color: #856404; font-size: 0.85rem; line-height: 1.4; }
    .legend .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); }
    .fc-list-event { transition: background 0.1s; }
    .fc-list-event.is-clickable { cursor: pointer; }
    .fc-list-event.is-clickable:hover { background: #f0f7ff !important; }
    .fc-header-toolbar { display: none; }
    .fc-list-day-cushion { background: #f1f1f1; font-weight: 700; padding: 8px 12px; border-radius: 8px; margin-top: 12px; }
    .fc-list-event-title { font-weight: 600; }
    .fc-list-event-time, .fc-event-time { display: none !important; }
    .fc-event-location { font-size: 0.85em; color: #6b7280; margin-top: 2px; }
  </style>
</head>
<body>

  <div class="container">
    <h1>Southwest Division Bowls – Events Agenda</h1>
    
    <div class="legend">
      <span class="item"><span class="swatch" style="background:#059669"></span> Women’s</span>
      <span class="item"><span class="swatch" style="background:#dc2626"></span> Men’s</span>
      <span class="item"><span class="swatch" style="background:#2563eb"></span> Club Sponsored</span>
      <span class="item"><span class="swatch" style="background:#7c3aed"></span> Other Tournaments</span>
      <span class="item"><span class="swatch" style="background:#f59e0b"></span> PBA</span>
    </div>

    <div class="info-bar">
      <strong>Note:</strong> Registration links (🔗) typically become active <strong>8-12 weeks</strong> before an event. Currently showing links for events within 90 days.
    </div>

    <div id="agenda"></div>
  </div>

<script>
  function shortLocation(loc) { return loc ? String(loc).split(",")[0].trim() : ""; }
  const YEAR = 2026;
  const REG_WINDOW_DAYS = 90; 

  // Restoration logic: Fetch events FIRST, then try capacities separately
  fetch(`/api/events?year=${YEAR}`)
    .then(r => r.json())
    .then(eventData => {
      // Try to get capacities, but DO NOT crash if it fails
      fetch(`/api/check-capacity`)
        .then(r => r.json())
        .catch(() => ({ success: false, data: [] })) 
        .then(capData => {
          renderCalendar(eventData.events || [], capData.data || []);
        });
    })
    .catch(err => {
      document.getElementById('agenda').innerHTML = "Failed to load event data.";
    });

  function renderCalendar(events, capacities) {
    const calendar = new FullCalendar.Calendar(document.getElementById("agenda"), {
      initialView: "listYear",
      initialDate: `2026-01-01`,
      headerToolbar: { left: 'today prev,next', center: 'title', right: 'listYear,month' },
      events: events,

      eventClick: function(info) {
        const url = info.event.extendedProps.eventUrl;
        if (url) window.open(url, '_blank');
      },

      eventContent: function(arg) {
        const title = arg.event.title;
        const url = arg.event.extendedProps.eventUrl;
        const daysUntil = (new Date(arg.event.start) - new Date()) / 86400000;
        const hasLink = !!url && daysUntil <= REG_WINDOW_DAYS;

        // Capacity Logic - Match by Name
        const capInfo = capacities.find(c => title.toLowerCase().includes(c.name.toLowerCase()));
        let capHtml = '';
        if (capInfo) {
          capHtml = `<div style="font-size:0.75em; color:#6b7280; margin-top:4px;">
            Green A: ${capInfo.leftA} left | Green B: ${capInfo.leftB} left
          </div>`;
        }

        return {
          html: `
            <div>
              <div class="fc-list-event-title">
                ${title} ${hasLink ? '<span style="color:#2563eb; margin-left:4px;">🔗</span>' : ''}
              </div>
              ${capHtml}
              <div style="font-size:0.75em; color:${hasLink ? '#2563eb' : '#9ca3af'};">
                ${hasLink ? 'Registration Open' : 'Link coming soon'}
              </div>
            </div>`
        };
      }
    });
    calendar.render();
  }
</script>
</body>
</html>
