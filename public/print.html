
<!doctype html><html><body>
<h2>SWD Events</h2><div id=l></div>
<script>
fetch("/api/events?days=365").then(r=>r.json()).then(d=>{
 d.events.forEach(e=>{
  const p=document.createElement("p");
  p.textContent=new Date(e.start).toLocaleDateString()+" — "+e.title;
  l.appendChild(p);
 });
});
</script></body></html>
